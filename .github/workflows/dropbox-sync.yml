name: Sync Repository to Dropbox

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [dropbox]
          type = dropbox
          token = {"access_token":"${{ secrets.DROPBOX_ACCESS_TOKEN }}","token_type":"bearer"}
          EOF

      - name: Sync to Dropbox
        run: |
          rclone sync . dropbox:"Julianah Beauty Studio Brand Management" \
            --exclude ".git/**" \
            --exclude ".github/**"

      - name: Verify
        run: rclone lsf dropbox:"Julianah Beauty Studio Brand Management"
